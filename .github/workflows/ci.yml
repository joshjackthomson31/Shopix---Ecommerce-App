name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ Job 1: Build & Test ============
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install server dependencies
        working-directory: server
        run: npm install

      - name: Install client dependencies
        working-directory: client
        run: npm install

      - name: Verify vite installed
        working-directory: client
        run: ls node_modules/.bin/vite && echo "vite found" || echo "vite NOT found"

      - name: Build React frontend
        working-directory: client
        run: npx vite build

  # ============ Job 2: Docker Build ============
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopix:${{ github.sha }} .

      - name: Verify Docker image
        run: docker images shopix:${{ github.sha }}
