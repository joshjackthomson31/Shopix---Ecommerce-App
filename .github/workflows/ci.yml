name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============ Job 1: Build & Test ============
  build:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build
        run: |
          echo "=== npm & node versions ==="
          node -v && npm -v
          echo "=== Installing server deps ==="
          npm install --prefix server
          echo "=== Installing client deps ==="
          npm install --prefix client
          echo "=== Debug: checking where vite landed ==="
          ls client/node_modules/.bin/vite 2>/dev/null && echo "FOUND in client" || echo "NOT in client"
          ls node_modules/.bin/vite 2>/dev/null && echo "FOUND in root" || echo "NOT in root"
          find . -name "vite" -path "*/.bin/vite" 2>/dev/null || echo "vite not found anywhere"
          echo "=== Building frontend ==="
          cd client && npm run build

  # ============ Job 2: Docker Build ============
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t shopix:${{ github.sha }} .

      - name: Verify Docker image
        run: docker images shopix:${{ github.sha }}
